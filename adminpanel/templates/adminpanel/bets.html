{% extends 'adminpanel/base.html' %}




{% block content %}



<div class="card">


<h2>
All Bets
</h2>



<table>


<tr>


<th>
User
</th>


<th>
Game
</th>


<th>
Type
</th>


<th>
Number
</th>


<th>
Amount
</th>



</tr>




{% for b in bets %}



<tr>


<td>
{{b.player.username}}
</td>


<td>
{{b.game.name}}
</td>


<td>
{{b.entry_type}}
</td>


<td>
{{b.selected_number}}
</td>


<td>
₹{{b.amount}}
</td>



</tr>



{% endfor %}



</table>



</div>



{% endblock %}
