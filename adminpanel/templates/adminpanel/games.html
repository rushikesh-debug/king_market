{% extends 'adminpanel/base.html' %}


{% block content %}


<div class="card">


<h2>
Game Management
</h2>



<table>


<tr>

<th>
Game Name
</th>

<th>
Open Time
</th>

<th>
Close Time
</th>

<th>
Status
</th>


</tr>




{% for g in games %}


<tr>


<td>
{{g.name}}
</td>


<td>
{{g.open_time}}
</td>


<td>
{{g.close_time}}
</td>


<td>

{% if g.is_active %}

Active

{% else %}

Closed

{% endif %}


</td>



</tr>



{% endfor %}



</table>


</div>



{% endblock %}
