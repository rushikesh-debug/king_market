{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Payment Page</title>

    {% load static %}

<link rel="stylesheet" href="{% static 'css/mobile.css' %}">

    <style>

        body{
            margin:0;
            padding:0;
            background:#f5f5f5;
            font-family:Arial, sans-serif;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px #ccc;
        }

        h1{
            text-align:center;
            color:green;
        }

        .amount{
            text-align:center;
            font-size:35px;
            font-weight:bold;
            color:red;
            margin:20px 0;
        }

        .details{
            margin-top:20px;
            line-height:35px;
            font-size:18px;
        }

        .qr{
            text-align:center;
            margin-top:20px;
        }

        .qr img{
            width:250px;
            height:250px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:green;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#006400;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Payment Page</h1>

    <div class="details">

        <b>Game:</b>
        {{ entry.game.name }}

        <br>

        <b>Number:</b>
        {{ entry.selected_number }}

        <br>

        <b>Bet Type:</b>
        {{ entry.entry_type }}

        <br>

        <b>Possible Win:</b>
        ₹ {{ entry.possible_win }}

    </div>

    <div class="amount">

        ₹ {{ entry.amount }}

    </div>

    <div class="qr">

        <h3>Scan QR & Pay</h3>

        <img src="{% static 'images/payment_qr.png' %}"
             alt="Payment QR">

    </div>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="utr_number"
            placeholder="Enter UTR Number"
            required
        >

        <button type="submit">

            Submit Payment

        </button>

    </form>

</div>

</body>

</html>
