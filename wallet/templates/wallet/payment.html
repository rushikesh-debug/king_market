<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Payment
</title>


{% load static %}

<link rel="stylesheet" href="{% static 'css/mobile.css' %}">


<style>


*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}



body{

    font-family:Arial,sans-serif;

    background:#f5f5f5;

}




.container{

    width:90%;

    max-width:450px;

    margin:40px auto;

}




.card{


    background:white;

    padding:30px;

    border-radius:15px;

    box-shadow:0 0 15px rgba(0,0,0,0.15);

    text-align:center;


}




h2{


    color:#00a651;

    margin-bottom:20px;


}





.amount{


    font-size:28px;

    font-weight:bold;

    color:#222;

    margin:20px;


}





.qr{


    margin:20px 0;


}





.qr img{


    width:250px;

    height:250px;

    border-radius:10px;


}





.info{


    background:#f0fff5;

    padding:15px;

    border-radius:10px;

    margin-bottom:20px;

    font-size:14px;


}




.info p{


    margin:8px;


}





button{


    width:100%;


    padding:14px;


    margin-top:20px;


    background:#00a651;


    color:white;


    border:none;


    border-radius:25px;


    font-size:18px;


    font-weight:bold;


    cursor:pointer;


}





button:hover{


    background:#008c45;


}




</style>


</head>



<body>



<div class="container">



<div class="card">





<h2>

💰 Complete Payment

</h2>





<div class="amount">


Pay ₹{{ amount }}


</div>







<div class="qr">


<img

src="data:image/png;base64,{{qr_image}}"

alt="Payment QR"


>



</div>







<div class="info">


<p>
1️⃣ QR Scan करून payment करा
</p>


<p>
2️⃣ Payment झाल्यानंतर खालील Submit Button दाबा
</p>


<p>
3️⃣ Admin verify केल्यानंतर wallet मध्ये balance add होईल
</p>


</div>







<form method="POST" action="{% url 'payment_submit' %}">


{% csrf_token %}




<input

type="hidden"

name="amount"

value="{{ amount }}"

>






<button type="submit">

✅ Submit Payment

</button>




</form>






</div>


</div>





</body>


</html>
