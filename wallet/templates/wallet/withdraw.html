<!DOCTYPE html>

<html>

<head>

<title>Withdraw</title>

{% load static %}

<link rel="stylesheet" href="{% static 'css/mobile.css' %}">


<style>


body{

font-family:Arial;

background:#f5f7fb;

}



.card{

width:400px;

margin:40px auto;

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 5px 15px #ddd;

}



h2{

text-align:center;

color:#1565c0;

}



.balance{

background:#e3f2fd;

padding:15px;

border-radius:10px;

text-align:center;

font-size:20px;

}



input{

width:100%;

padding:14px;

margin-top:15px;

border-radius:10px;

border:1px solid #ccc;

}



button{

width:100%;

padding:15px;

margin-top:20px;

background:#1565c0;

color:white;

border:none;

border-radius:30px;

font-size:17px;

}



</style>


</head>


<body>


<div class="card">


<h2>
💰 Withdraw
</h2>


<div class="balance">

Wallet Balance ₹{{wallet.balance}}

</div>



<form method="POST">

{% csrf_token %}


<input

type="number"

name="amount"

placeholder="Enter Amount"

required>



<button>

REQUEST WITHDRAW

</button>


</form>


</div>


</body>

</html>
